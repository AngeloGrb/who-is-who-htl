<ion-header>
  <ion-toolbar color="primary">
    <ion-title>Who is Who - HTL</ion-title>
  </ion-toolbar>
  <ion-toolbar color="primary">
    <ion-searchbar (ionInput)="handleInput($event)" placeholder="Suchen..."></ion-searchbar>
  </ion-toolbar>
</ion-header>

<ion-content>
  <ion-card *ngIf="showLoginCard && !authService.isLoggedIn">
    <ion-card-header>
      <div style="display: flex; justify-content: space-between; align-items: center;">
        <ion-card-title>Willkommen!</ion-card-title>
        <ion-button fill="clear" color="dark" (click)="showLoginCard = false">
          <ion-icon name="close-outline"></ion-icon>
        </ion-button>
      </div>
    </ion-card-header>
    <ion-card-content>
      Melde dich an, um neue Profile zu erstellen oder Details anzusehen.
      <ion-button expand="block" fill="outline" routerLink="/login" style="margin-top: 10px;">Jetzt Anmelden</ion-button>
    </ion-card-content>
  </ion-card>

  <ion-list>
    <ion-list-header>
      <ion-label>Alle Profile</ion-label>
    </ion-list-header>

    <ion-item [button]="true" *ngFor="let profile of filteredProfiles" (click)="goToDetail(profile)">
      <ion-avatar slot="start">
        <img alt="Avatar" src="https://ionicframework.com/docs/img/demos/avatar.svg" />
      </ion-avatar>
      <ion-label>
        <h2>{{ profile.name }}</h2>
        <p>{{ profile.role }}</p>
      </ion-label>
    </ion-item>
  </ion-list>

  <ion-fab vertical="bottom" horizontal="end" slot="fixed">
    <ion-fab-button (click)="checkAction('/profile-student')">
      <ion-icon name="add"></ion-icon>
    </ion-fab-button>
  </ion-fab>
</ion-content>
