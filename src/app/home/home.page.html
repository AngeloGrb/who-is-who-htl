<ion-header>
  <ion-toolbar color="primary">
    <ion-title>Who is Who - HTL</ion-title>
    <ion-buttons slot="end" *ngIf="authService.authState$ | async">
      <ion-button (click)="logout()">
        <ion-icon slot="icon-only" name="log-out-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content>
  <ion-card *ngIf="!(authService.authState$ | async)">
    <ion-card-content>
      Willkommen! Bitte melde dich an, um Profile zu sehen oder zu erstellen.
      <ion-button expand="block" routerLink="/login" class="ion-margin-top">Login</ion-button>
    </ion-card-content>
  </ion-card>

  <ion-searchbar (ionInput)="handleInput($event)" placeholder="Suchen..."></ion-searchbar>

  <ion-list>
    <ion-list-header><ion-label>Personenverzeichnis</ion-label></ion-list-header>

    <ion-item *ngFor="let profile of (filteredProfiles$ | async)" (click)="goToDetail(profile)" button detail="true">
      <ion-avatar slot="start">
        <img [src]="'https://ui-avatars.com/api/?name=' + profile.name" />
      </ion-avatar>
      <ion-label>
        <h2>{{ profile.name }}</h2>
        <p>{{ profile.role }}</p>
      </ion-label>
    </ion-item>
  </ion-list>

  <ion-fab slot="fixed" vertical="bottom" horizontal="end" *ngIf="authService.authState$ | async">
    <ion-fab-button color="primary">
      <ion-icon name="add"></ion-icon>
    </ion-fab-button>
    <ion-fab-list side="top">
      <ion-fab-button (click)="router.navigate(['/profile-student'])">
        <ion-icon name="person"></ion-icon>
      </ion-fab-button>
      <ion-fab-button (click)="router.navigate(['/profile-teacher'])">
        <ion-icon name="briefcase"></ion-icon>
      </ion-fab-button>
    </ion-fab-list>
  </ion-fab>
</ion-content>
