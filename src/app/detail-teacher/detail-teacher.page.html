<ion-header>
  <ion-toolbar color="primary">
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/home"></ion-back-button>
    </ion-buttons>
    <ion-title>Lehrer Details</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <div *ngIf="profile">
    <div style="text-align: center; margin-top: 20px;">
      <ion-icon name="person-circle-outline" style="font-size: 100px; color: var(--ion-color-primary);"></ion-icon>
      <h2>{{ profile.name }}</h2>
      <p style="color: gray;">{{ profile.role }}</p>
    </div>

    <ion-card style="margin-top: 20px;">
      <ion-card-header>
        <ion-card-title>Informationen & Sprechstunde</ion-card-title>
      </ion-card-header>
      <ion-card-content>
        <ion-item lines="none">
          <ion-icon name="briefcase-outline" slot="start"></ion-icon>
          <ion-label class="ion-text-wrap">{{ profile.extraInfo || 'Keine weiteren Informationen angegeben.' }}</ion-label>
        </ion-item>
      </ion-card-content>
    </ion-card>
  </div>

  <div *ngIf="!profile" style="text-align: center; margin-top: 50px;">
    <h3>Profil nicht gefunden.</h3>
  </div>
</ion-content>
